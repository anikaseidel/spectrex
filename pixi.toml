[workspace]
authors = ["Anika Seidel <79158148+anikaseidel@users.noreply.github.com>"]
channels = ["conda-forge"]
name = "spectrex"
platforms = ["win-64","linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
photutils = ">=3.0.0,<4"
pip = ">=26.1.2,<27"
astroquery = ">=0.4.11,<0.5"
python = "3.12.*"
cvxpy = ">=1.9.1,<2"
osqp = ">=1.1.3,<2"

[feature.jwst-env.dependencies]
python = "3.12.*"
pip = "*"


[environments]
default = {features = []}
jwst-env = { features = ["jwst-env"] }

